<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batuque Nacional</title>

    <link rel="stylesheet" href="style.css">

    <!-- Ícones -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- MENU -->
    <aside class="sidebar">

        <h1 class="logo">
            <i class="fa-solid fa-music"></i>
         Batuque Nacional
        </h1>

        <h3>Playlist</h3>

        <ul id="playlist">

            <!-- Preenchido automaticamente pelo JavaScript -->

        </ul>

    </aside>

    <!-- PLAYER -->

    <main class="player">

        <img
            id="cover"
            src="capa1.jpg"
            class="cover">

        <h2 id="title">
            Minha Música
        </h2>

        <p id="artist">
            Isabela
        </p>

        <audio id="audio"></audio>

        <!-- Barra -->

        <div class="progress-container">

            <span id="currentTime">
                0:00
            </span>

            <input
                type="range"
                id="progress"
                value="0"
                min="0"
                max="100">

            <span id="duration">
                0:00
            </span>

        </div>

        <!-- Controles -->

        <div class="controls">

            <button id="prev">
                <i class="fa-solid fa-backward"></i>
            </button>

            <button id="play">
                <i class="fa-solid fa-play"></i>
            </button>

            <button id="next">
                <i class="fa-solid fa-forward"></i>
            </button>

            <button id="like">
                <i class="fa-regular fa-heart"></i>
            </button>

        </div>

        <!-- Volume -->

        <div class="volume">

            <i class="fa-solid fa-volume-low"></i>

            <input
                type="range"
                id="volume"
                min="0"
               	max="100"
                value="80">

        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
